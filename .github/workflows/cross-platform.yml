name: Cross-Platform Build & Verify
on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true
          
      - name: Build & Verify
        shell: bash  # Use bash for cross-platform compatibility
        run: |
          go mod tidy
          go build -o ani-rem
          
      - name: Test Binary
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            ./ani-rem.exe version
          else
            ./ani-rem version
          fi
        env:
          RUNNER_OS: ${{ runner.os }}
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ani-rem-${{ matrix.os }}
          path: ${{ matrix.os == 'windows-latest' && 'ani-rem.exe' || 'ani-rem' }}
          if-no-files-found: error