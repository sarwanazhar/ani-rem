name: Cross-Platform Build & Verify
on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true
          
      - name: Build & Verify (with debug)
        shell: bash
        run: |
          go mod tidy
          echo "=== Building binary ==="
          go build -v -o ani-rem
          echo "=== Files after build ==="
          ls -la
          # On Windows, also show dir via cmd for clarity
          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "=== DIR from cmd ==="
            cmd.exe /c "dir"
          fi
          
      - name: Test Binary
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            # Try both possible executable names
            if [ -f "ani-rem.exe" ]; then
              echo "Found ani-rem.exe, running version..."
              ./ani-rem.exe version
            elif [ -f "ani-rem" ]; then
              echo "Found ani-rem (no .exe), running version..."
              ./ani-rem version
            else
              echo "ERROR: No ani-rem binary found!"
              exit 1
            fi
          else
            ./ani-rem version
          fi
        env:
          RUNNER_OS: ${{ runner.os }}
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ani-rem-${{ matrix.os }}
          path: ${{ matrix.os == 'windows-latest' && 'ani-rem.exe' || 'ani-rem' }}
          if-no-files-found: error